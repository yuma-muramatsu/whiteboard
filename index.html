<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>whiteboard</title>
    <meta name="description" content="16マスグリッドで優先度を管理するシンプルなタスクボード">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <!-- Header -->
    <header id="appHeader">
        <div class="header-left">
            <h1 id="appTitle">whiteboard</h1>
        </div>
        <div class="header-right">
            <button id="resetBoardBtn" title="ボードを初期化（デフォルトの4×4構成に戻す）">リセット</button>
            <button id="collapseAllBtn" title="すべて折りたたむ">⊟ すべて折りたたむ</button>
        </div>
    </header>

    <!-- Main Board Area -->
    <div class="board-wrapper">
        <div class="board-content">
            <main id="setsGrid">
                <!-- Sets will be dynamically inserted here -->
            </main>
            <!-- Bottom Add Button -->
            <button id="addRowBtn" class="add-btn row-add-btn" title="行を追加">＋</button>
        </div>
        <!-- Right Add Button -->
        <button id="addColBtn" class="add-btn col-add-btn" title="列を追加">＋</button>
    </div>

    <!-- Toast notification -->
    <div id="toast" class="toast"></div>

    <!-- JavaScript -->
    <script src="js/app.js"></script>
</body>

</html>
